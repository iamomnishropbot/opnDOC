name: Build and Run with PyPy3

on:
  push:
  pull_request:

jobs:
  run-opndoc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python interpreter (PyPy3.10)
        uses: actions/setup-python@v5
        with:
          python-version: 'pypy3.10'

      - name: Install project dependencies from requirements.txt
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Create CI environment file from template
        # Idempotent by design: repeated runs overwrite `.env` from `.env.sample`.
        # For production usage, replace this with GitHub Secrets-backed values.
        run: |
          if [ ! -f .env.sample ]; then
            echo "Missing .env.sample; cannot create CI .env template." >&2
            exit 1
          fi
          cp -f .env.sample .env

      - name: Run main script (realai_local_controller.py)
        # This is a smoke-run guardrail for CI templates; adjust if runtime needs differ.
        timeout-minutes: 5
        # Extension notes:
        # - If tests are added, insert a dedicated step before this one
        #   (e.g., `python -m pytest` or `python -m unittest discover`).
        # - If the primary entrypoint changes, replace the script path below.
        run: python realai_local_controller.py
